<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6cf0"/>
      <stop offset="100%" stop-color="#5a4bd4"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- First C (code bracket) -->
  <path d="M220 160 L140 256 L220 352" stroke="white" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Second C (code bracket, offset) -->
  <path d="M295 160 L215 256 L295 352" stroke="white" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>

  <!-- Closing bracket -->
  <path d="M340 180 L400 256 L340 332" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>

  <!-- 4 agent dots (slightly larger for small sizes) -->
  <circle cx="108" cy="108" r="24" fill="#d4a574"/>
  <circle cx="404" cy="108" r="24" fill="#ff6b6b"/>
  <circle cx="108" cy="404" r="24" fill="#4ecdc4"/>
  <circle cx="404" cy="404" r="24" fill="#00d68f"/>
</svg>
