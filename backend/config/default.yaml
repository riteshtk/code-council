# CodeCouncil — default configuration
# This file documents all available settings with their default values.
# Override any section in ~/.codecouncil/config.yaml (global) or
# .codecouncil.yaml (project-level).

council:
  name: "Default Council"
  max_rounds: 3
  parallel_analysis: true
  debate_topology: "adversarial"   # adversarial | collaborative | socratic | open_floor | panel | custom
  custom_topology: []
  vote_threshold: 0.5              # 0.0 – 1.0
  vote_threshold_critical: 1.0    # unanimous required for critical decisions
  deadlock_detection: true
  hitl_enabled: false
  hitl_timeout_minutes: 30
  budget_limit_usd: 0             # 0 = unlimited
  session_memory: true

llm:
  default_provider: "openai"
  default_model: "gpt-4o"
  providers:
    openai:
      api_key: ""
      base_url: ""
      org_id: ""
      api_version: "2024-02-01"
    anthropic:
      api_key: ""
      base_url: ""
      api_version: "2024-02-01"
    google:
      api_key: ""
      api_version: "2024-02-01"
    mistral:
      api_key: ""
      api_version: "2024-02-01"
    ollama:
      base_url: "http://localhost:11434"
      api_version: "2024-02-01"
    bedrock:
      region: "us-east-1"
      profile: ""
      api_version: "2024-02-01"
    azure:
      api_key: ""
      endpoint: ""
      api_version: "2024-02-01"

agents:
  archaeologist:
    enabled: true
    provider: ""        # empty = use llm.default_provider
    model: ""           # empty = use llm.default_model
    temperature: 0.3
    max_tokens: 2000
    streaming: true
    persona: "default"
    vote_weight: 1.0
    fallback_providers: []
    focus_areas:
      git_history: true
      churn_analysis: true
      bus_factor: true
      dead_code: true
      test_coverage: true
    thresholds:
      churn_high: 0.7
      coverage_low: 0.4
      bus_factor_critical: 1.5

  skeptic:
    enabled: true
    provider: ""
    model: ""
    temperature: 0.2
    max_tokens: 2000
    streaming: true
    persona: "default"
    vote_weight: 1.0
    can_deadlock: true
    deadlock_requires_evidence: true
    fallback_providers: []
    focus_areas:
      security: true
      performance: true
      scalability: true
      coupling: true
      tech_debt: true
    thresholds:
      severity_deadlock: 0.9
      severity_veto: 0.75

  visionary:
    enabled: true
    provider: ""
    model: ""
    temperature: 0.7
    max_tokens: 2500
    streaming: true
    persona: "default"
    vote_weight: 1.0
    max_proposals: 8
    ambition_level: "moderate"   # conservative | moderate | ambitious
    fallback_providers: []
    focus_areas:
      architecture: true
      modernization: true
      developer_experience: true
      observability: true
      automation: true
    thresholds:
      min_impact_score: 0.3
      effort_ceiling: 0.9

  scribe:
    enabled: true
    provider: ""
    model: ""
    temperature: 0.1
    max_tokens: 4000
    streaming: true
    persona: "default"
    vote_weight: 1.0
    output_format: "markdown"    # markdown | json | html
    preserve_dissent: true
    include_debate_excerpt: true
    excerpt_max_exchanges: 5
    action_item_format: "numbered"   # numbered | bulleted | table
    fallback_providers: []
    rfc_sections:
      executive_summary: true
      findings: true
      proposals: true
      debate_summary: true
      action_items: true
      dissent: true
      appendix: true
    focus_areas:
      synthesis: true
      action_items: true
      dissent_capture: true
      rfc_structure: true

  custom: []

ingest:
  source: "github_api"
  github_token: ""
  gitlab_token: ""
  bitbucket_token: ""
  max_files: 500
  max_file_size_kb: 100
  git_log_limit: 200
  ast_parse: true
  dependency_scan: true
  cve_scan: true
  secret_detection: true
  licence_check: true
  incremental: true
  include_extensions:
    - ".py"
    - ".js"
    - ".ts"
    - ".tsx"
    - ".jsx"
    - ".go"
    - ".rs"
    - ".java"
    - ".kt"
    - ".rb"
    - ".php"
    - ".cs"
    - ".cpp"
    - ".c"
    - ".h"
    - ".yaml"
  exclude_paths:
    - "node_modules"
    - ".git"
    - "dist"
    - "build"
    - "__pycache__"

output:
  directory: "./output"
  filename_pattern: "RFC-{repo}-{timestamp}"
  formats:
    - "markdown"
  save_debate_transcript: true
  save_agent_events: true
  save_cost_report: true
  save_state_snapshots: false
  open_after_complete: true
  webhook_url: ""

ui:
  api_port: 8000
  ui_port: 5173
  theme: "dark"           # dark | light | system
  stream_delay_ms: 0
  show_agent_thinking: true
  show_graph_visualiser: true
  show_cost_meter: true
  auto_scroll_feed: true
  sound_on_vote: false
  sound_on_deadlock: false
  demo_mode: false
